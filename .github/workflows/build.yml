name: build
on:
  push:
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  cargo-test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      # perrr-node is excluded: its integration test links against the
      # napi-rs crate which needs N-API symbols provided at runtime by
      # Node. On Linux, rust-lld rejects undefined symbols at link
      # time. perrr-node's compile is still covered by the build
      # matrix (which produces the actual .node binary); `hello()`
      # behavior is covered by packages/perrr/test/smoke.test.ts.
      - run: cargo test --workspace --exclude perrr-node

  build:
    name: build-${{ matrix.settings.target }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: macos-13
            target: x86_64-apple-darwin
          - host: macos-14
            target: aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # aarch64-unknown-linux-gnu + x86_64-unknown-linux-musl
          # dropped from CI for now. The napi-rs nodejs-rust docker
          # images (ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
          # and :lts-alpine) are ~1+ year stale and ship Node 18, but
          # @napi-rs/cli v3's transitive dep @inquirer/core uses
          # styleText from 'node:util' which requires Node 20.8+.
          # Revisit when napi-rs publishes newer images OR when we
          # invest in our own Dockerfile. Non-blocking for v0.1 since
          # the 4 native triples cover >95% of users.
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@master
        if: matrix.settings.docker == ''
        with:
          toolchain: "1.95.0"
          targets: ${{ matrix.settings.target }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build (native)
        if: matrix.settings.docker == ''
        shell: bash
        run: pnpm -F perrr build -- --target ${{ matrix.settings.target }}
      - name: Build (docker)
        if: matrix.settings.docker != ''
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.settings.docker }}
          # napi-rs's arm64-aarch64 / alpine docker images ship an older
          # corepack that fails on pnpm's current signing key
          # (COREPACK_INTEGRITY_KEYS error). Bypass corepack entirely
          # and install pnpm directly with the exact version from
          # package.json's packageManager field.
          options: -v ${{ github.workspace }}:/build -w /build -e COREPACK_ENABLE_STRICT=0
          run: |
            npm install -g pnpm@10.33.2
            pnpm install --frozen-lockfile
            pnpm -F perrr build -- --target ${{ matrix.settings.target }}
      - name: Test
        if: matrix.settings.docker == ''
        run: pnpm -F perrr test
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: packages/perrr/perrr.*.node
          if-no-files-found: error
